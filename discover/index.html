var activeFilter = 'all';
var sortHigh = true;
var selectedId = null;

function levelKey(d) {
  if (d.score >= 85) return 'high';
  if (d.score >= 60) return 'moderate';
  if (d.score >= 30) return 'building';
  return 'early';
}

function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.fbtn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  render();
}

function toggleSort() {
  sortHigh = !sortHigh;
  document.getElementById('sort-label').textContent = sortHigh ? 'Highest Score' : 'Lowest Score';
  render();
}

function getFiltered() {
  var q = document.getElementById('search').value.toLowerCase();
  return dishes.filter(function(d) {
    if (q && d.name.toLowerCase().indexOf(q) === -1 && d.restaurant.toLowerCase().indexOf(q) === -1 && d.ingredients.join(' ').toLowerCase().indexOf(q) === -1) return false;
    if (activeFilter === 'vegan') return d.tags.indexOf('vegan') > -1;
    if (activeFilter === 'vegetarian') return d.tags.indexOf('vegetarian') > -1 || d.tags.indexOf('vegan') > -1;
    if (activeFilter === 'gluten-free') return d.tags.indexOf('gluten-free') > -1;
    if (activeFilter === 'no-dairy') return d.allergens.toLowerCase().indexOf('dairy') === -1;
    if (activeFilter === 'no-nuts') return d.allergens.toLowerCase().indexOf('tree nuts') === -1 && d.allergens.toLowerCase().indexOf('nuts') === -1;
    if (activeFilter === '60plus') return d.score >= 60;
    return true;
  }).sort(function(a,b) { return sortHigh ? b.score - a.score : a.score - b.score; });
}

function render() {
  var filtered = getFiltered();
  document.getElementById('results-count').textContent = filtered.length + ' dish' + (filtered.length !== 1 ? 'es' : '');
  var grid = document.getElementById('grid');
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty"><div class="empty-title">No dishes found</div><p>Try adjusting your search or filter.</p></div>';
    return;
  }
  grid.innerHTML = filtered.map(function(d) {
    var lk = levelKey(d);
    var tagsHtml = d.tags.map(function(t) {
      var cls = t === 'vegan' ? 'ctag-vegan' : t === 'vegetarian' ? 'ctag-vegetarian' : 'ctag-gluten';
      return '<span class="ctag ' + cls + '">' + t + '</span>';
    }).join('');
    return '<div class="card' + (selectedId === d.id ? ' selected' : '') + '" onclick="openDetail(\'' + d.id + '\')">' +
      '<div class="card-restaurant">' + d.restaurant + ' · ' + d.location + '</div>' +
      '<div class="card-name">' + d.name + '</div>' +
      '<div class="card-score-row"><span class="card-score ' + lk + '">' + d.score + '</span><span class="card-denom">/100</span></div>' +
      '<div class="card-bar"><div class="card-bar-fill ' + lk + '" style="width:' + d.score + '%"></div></div>' +
      '<div class="card-level">' + (lk === 'moderate' ? 'Moderate' : lk === 'high' ? 'High' : lk === 'building' ? 'Building' : 'Early Stage') + ' Transparency</div>' +
      (tagsHtml ? '<div class="card-tags">' + tagsHtml + '</div>' : '') +
      '</div>';
  }).join('');
}

function openDetail(id) {
  selectedId = id;
  render();
  var d = dishes.find(function(x) { return x.id === id; });
  var lk = levelKey(d);
  var levelLabel = lk === 'moderate' ? 'Moderate Transparency' : lk === 'high' ? 'High Transparency' : lk === 'building' ? 'Building Transparency' : 'Early Stage';
  var tagsHtml = d.tags.map(function(t) {
    var cls = t === 'vegan' ? 'ctag-vegan' : t === 'vegetarian' ? 'ctag-vegetarian' : 'ctag-gluten';
    return '<span class="ctag ' + cls + '">' + t + '</span>';
  }).join('');
  var ingHtml = d.ingredients.map(function(i) { return '<span class="ing-chip">' + i + '</span>'; }).join('');
  document.getElementById('detail-content').innerHTML =
    '<div class="detail-restaurant">' + d.restaurant + ' · ' + d.location + '</div>' +
    '<div class="detail-name">' + d.name + '</div>' +
    '<div class="detail-score-big ' + lk + '">' + d.score + '<span style="font-size:28px;color:#9A9488">/100</span></div>' +
    '<div class="detail-level">' + levelLabel + '</div>' +
    (d.score > 44 ? '<div class="detail-context">' + (d.score - 44) + ' points above the Birmingham average of 44</div>' : '') +
    '<div class="detail-dims">' +
      '<div class="dim-row"><span class="dim-label">Core Ingredient Clarity</span><div class="dim-bar"><div class="dim-fill" style="width:' + (d.core/25*100) + '%"></div></div><span class="dim-val">' + d.core + '</span></div>' +
      '<div class="dim-row"><span class="dim-label">Sauce and Seasoning</span><div class="dim-bar"><div class="dim-fill" style="width:' + (d.sauce/25*100) + '%"></div></div><span class="dim-val">' + d.sauce + '</span></div>' +
      '<div class="dim-row"><span class="dim-label">Allergen Transparency</span><div class="dim-bar"><div class="dim-fill" style="width:' + (d.allergen/25*100) + '%"></div></div><span class="dim-val">' + d.allergen + '</span></div>' +
      '<div class="dim-row"><span class="dim-label">Prep Input Clarity</span><div class="dim-bar"><div class="dim-fill" style="width:' + (d.prep/25*100) + '%"></div></div><span class="dim-val">' + d.prep + '</span></div>' +
    '</div>' +
    (tagsHtml ? '<div class="detail-section-title">Dietary Tags</div><div class="detail-tags">' + tagsHtml + '</div>' : '') +
    '<div class="detail-section-title">Allergens on Record</div>' +
    '<div class="detail-allergens">' + d.allergens + '</div>' +
    '<div class="detail-section-title">Ingredients on Record</div>' +
    '<div class="detail-ingredients">' + ingHtml + '</div>' +
    '<div class="detail-section-title">Scoring Notes</div>' +
    '<div class="detail-allergens">' + d.notes + '</div>';
  document.getElementById('detail-panel').classList.add('open');
}

function closeDetail() {
  selectedId = null;
  render();
  document.getElementById('detail-panel').classList.remove('open');
}

render();
</script>
